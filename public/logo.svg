<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 250" width="680" height="250" role="img" aria-label="מצבה יהודית — Matzeva Yehudit">
  <defs>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#efeadf"/>
      <stop offset="1" stop-color="#cdc4b2"/>
    </linearGradient>
  </defs>

  <!-- Emblem: olive branches -->
  <g fill="none" stroke="#b08d57" stroke-width="3" stroke-linecap="round">
    <path d="M120 212 C70 200 52 150 64 96"/>
    <path d="M120 212 C170 200 188 150 176 96"/>
  </g>
  <g fill="#9a7b4f">
    <!-- left leaves -->
    <ellipse cx="60" cy="110" rx="9" ry="4.5" transform="rotate(-40 60 110)"/>
    <ellipse cx="66" cy="135" rx="9" ry="4.5" transform="rotate(-30 66 135)"/>
    <ellipse cx="76" cy="160" rx="9" ry="4.5" transform="rotate(-20 76 160)"/>
    <ellipse cx="92" cy="185" rx="9" ry="4.5" transform="rotate(-8 92 185)"/>
    <!-- right leaves -->
    <ellipse cx="180" cy="110" rx="9" ry="4.5" transform="rotate(40 180 110)"/>
    <ellipse cx="174" cy="135" rx="9" ry="4.5" transform="rotate(30 174 135)"/>
    <ellipse cx="164" cy="160" rx="9" ry="4.5" transform="rotate(20 164 160)"/>
    <ellipse cx="148" cy="185" rx="9" ry="4.5" transform="rotate(8 148 185)"/>
  </g>

  <!-- Tombstone -->
  <path d="M86 214 V104 a34 34 0 0 1 68 0 V214 Z" fill="url(#stone)" stroke="#a99e86" stroke-width="2"/>
  <rect x="78" y="214" width="84" height="12" rx="2" fill="#bcae93" stroke="#a99e86" stroke-width="1.5"/>

  <!-- Star of David -->
  <g fill="none" stroke="#2f4858" stroke-width="3" transform="translate(120,116)">
    <polygon points="0,-20 17.3,10 -17.3,10"/>
    <polygon points="0,20 17.3,-10 -17.3,-10"/>
  </g>

  <!-- Menorah -->
  <g fill="none" stroke="#9a7b4f" stroke-width="2.6" stroke-linecap="round" transform="translate(120,168)">
    <path d="M0,-14 V8"/>
    <path d="M-18,-14 V-6 a18 18 0 0 0 0 0"/>
    <path d="M-18,-14 C-18,-2 -12,2 0,2"/>
    <path d="M18,-14 C18,-2 12,2 0,2"/>
    <path d="M-12,-14 C-12,-4 -8,0 0,0"/>
    <path d="M12,-14 C12,-4 8,0 0,0"/>
    <path d="M-6,-14 C-6,-6 -3,-2 0,-2"/>
    <path d="M6,-14 C6,-6 3,-2 0,-2"/>
    <path d="M-10,10 H10"/>
  </g>

  <!-- Text lockup -->
  <text x="660" y="96" text-anchor="end" direction="rtl" font-family="Heebo, Arial, sans-serif" font-size="58" font-weight="800" fill="#2f4858">מצבה יהודית</text>
  <text x="660" y="134" text-anchor="end" direction="rtl" font-family="Heebo, Arial, sans-serif" font-size="26" font-weight="600" fill="#6f5e44">זיכרון · מסורת · כבוד</text>
  <line x1="240" y1="156" x2="660" y2="156" stroke="#d8cfbb" stroke-width="2"/>
  <text x="660" y="194" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" letter-spacing="1" fill="#2f4858">MATZEVA YEHUDIT</text>
  <text x="660" y="220" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="16" letter-spacing="2" fill="#7d7464">JEWISH TOMBSTONES &amp; MEMORIALS</text>
</svg>
